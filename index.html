<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0c12">
<title>GearTrack</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Mono', 'Courier New', monospace; background: #0a0c12; color: #e8e8e8; min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 40px; }

  /* Header */
  .header { background: #11131f; border-bottom: 1px solid #1e2235; padding: 16px 18px 12px; display: flex; justify-content: space-between; align-items: flex-end; }
  .logo { font-size: 20px; font-weight: 700; letter-spacing: 4px; color: #f59e0b; }
  .subtitle { font-size: 10px; color: #555; letter-spacing: 2px; margin-top: 2px; }
  .item-title { font-size: 14px; color: #e8e8e8; font-weight: 600; margin-top: 4px; }
  .saved-badge { background: #00e5a022; color: #00e5a0; border: 1px solid #00e5a044; border-radius: 6px; padding: 4px 10px; font-size: 11px; opacity: 0; transition: opacity 0.3s; }
  .saved-badge.show { opacity: 1; }
  .back-btn { background: none; border: 1px solid #2a2d3a; border-radius: 7px; color: #aaa; font-size: 12px; padding: 6px 12px; cursor: pointer; font-family: inherit; }

  /* Nav */
  .nav { display: flex; background: #11131f; border-bottom: 1px solid #1e2235; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .nav::-webkit-scrollbar { display: none; }
  .nav-btn { flex-shrink: 0; padding: 11px 12px; background: none; border: none; color: #666; font-size: 11px; cursor: pointer; letter-spacing: 0.5px; border-bottom: 2px solid transparent; white-space: nowrap; font-family: inherit; }
  .nav-btn.active { color: #f59e0b; border-bottom: 2px solid #f59e0b; }

  /* Body */
  .body { padding: 14px; }

  /* Stats */
  .stats-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .stat-card { flex: 1; background: #11131f; border: 1px solid #1e2235; border-radius: 10px; padding: 14px 10px; text-align: center; }
  .stat-num { font-size: 28px; font-weight: 700; color: #f59e0b; }
  .stat-num.green { color: #00e5a0; }
  .stat-num.amber { color: #f59e0b; }
  .stat-label { font-size: 10px; color: #666; margin-top: 4px; letter-spacing: 1px; }

  /* Section title */
  .section-title { font-size: 10px; color: #666; letter-spacing: 2px; margin-bottom: 10px; margin-top: 4px; }

  /* Dashboard stage row */
  .dash-stage-row { display: flex; align-items: center; gap: 12px; background: #11131f; border: 1px solid #1e2235; border-radius: 9px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; }
  .dash-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .dash-stage-name { flex: 1; font-size: 13px; font-weight: 500; }
  .dash-count { font-size: 20px; font-weight: 700; }

  /* List */
  .list { display: flex; flex-direction: column; gap: 10px; }

  /* Item card */
  .item-card { background: #11131f; border: 1px solid #1e2235; border-radius: 12px; padding: 15px; cursor: pointer; transition: border-color 0.2s; }
  .item-card:active { border-color: #f59e0b44; }
  .item-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .item-name { font-size: 14px; font-weight: 700; color: #e8e8e8; margin-bottom: 3px; }
  .item-mat { font-size: 11px; color: #666; }
  .stage-pill { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .progress-bar { height: 4px; background: #1e2235; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  .item-meta { display: flex; justify-content: space-between; font-size: 10px; color: #555; }

  /* Empty */
  .empty { text-align: center; color: #444; padding: 60px 20px; line-height: 2; font-size: 14px; }

  /* Info row (detail) */
  .info-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .tag { background: #1e2235; border: 1px solid #2a2d3a; border-radius: 6px; padding: 4px 10px; font-size: 11px; color: #888; }

  /* Pipeline */
  .pipeline-card { background: #11131f; border: 1px solid #1e2235; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
  .stage-row { display: flex; align-items: flex-start; }
  .stage-icon-box { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; z-index: 1; border: 1px solid #2a2d3a; background: #1e2130; }
  .stage-connector-col { width: 2px; margin-left: 18px; flex-shrink: 0; }
  .connector-line { width: 2px; height: 28px; background: #2a2d3a; }
  .connector-line.done { background: #00e5a0; }
  .stage-info-col { flex: 1; padding-left: 14px; padding-bottom: 18px; padding-top: 6px; }
  .stage-name-label { font-size: 13px; font-weight: 600; margin-bottom: 3px; color: #888; }
  .stage-name-label.current { }
  .stage-name-label.completed { color: #e8e8e8; }
  .stage-qty { font-size: 13px; font-weight: 700; color: #e8e8e8; }
  .reject-badge { background: #ef444422; color: #ef4444; border: 1px solid #ef444433; border-radius: 5px; padding: 1px 7px; font-size: 10px; margin-left: 6px; }
  .stage-date-label { font-size: 10px; color: #555; display: block; margin-top: 2px; }
  .stage-note-label { font-size: 10px; color: #888; display: block; font-style: italic; }
  .stage-pending { font-size: 11px; color: #444; font-style: italic; }

  /* Buttons */
  .move-btn { width: 100%; padding: 14px 0; background: #f59e0b; color: #0a0c12; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 1px; font-family: inherit; }
  .complete-badge { width: 100%; padding: 14px 0; background: #00e5a022; color: #00e5a0; border: 1px solid #00e5a044; border-radius: 10px; font-size: 13px; font-weight: 700; text-align: center; }

  /* Log */
  .log-entry { background: #11131f; border: 1px solid #1e2235; border-radius: 10px; padding: 13px; display: flex; gap: 12px; align-items: flex-start; }
  .log-badge { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .log-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .log-meta { font-size: 11px; color: #888; margin-bottom: 3px; }
  .log-date { font-size: 10px; color: #555; }

  /* Form */
  .form-card { background: #11131f; border: 1px solid #1e2235; border-radius: 12px; padding: 20px; }
  .form-title { font-size: 15px; font-weight: 700; color: #f59e0b; margin-bottom: 18px; letter-spacing: 2px; }
  label { display: block; font-size: 10px; color: #777; letter-spacing: 1px; margin-bottom: 6px; margin-top: 14px; }
  input, select, textarea { width: 100%; background: #0a0c12; border: 1px solid #1e2235; border-radius: 8px; padding: 10px 12px; color: #e8e8e8; font-size: 13px; outline: none; font-family: inherit; }
  input:focus, select:focus { border-color: #f59e0b55; }
  select option { background: #11131f; }
  .submit-btn { margin-top: 20px; width: 100%; padding: 13px 0; background: #f59e0b; color: #0a0c12; border: none; border-radius: 9px; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 1px; font-family: inherit; }

  /* Modal overlay */
  .overlay { position: fixed; inset: 0; background: #000000cc; display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
  .modal { background: #11131f; border: 1px solid #1e2235; border-top: 2px solid #f59e0b; border-radius: 16px 16px 0 0; padding: 22px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .modal-flow { font-size: 13px; margin-bottom: 6px; }
  .modal-current { font-size: 12px; color: #888; margin-bottom: 14px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .cancel-btn { flex: 1; padding: 13px 0; background: none; border: 1px solid #1e2235; border-radius: 9px; color: #888; font-size: 13px; cursor: pointer; font-family: inherit; }
  .confirm-btn { flex: 1; padding: 13px 0; border: none; border-radius: 9px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; color: #0a0c12; }

  /* Toggle row */
  .toggle-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .toggle-btn { flex: 1; padding: 9px 0; background: #0a0c12; border: 1px solid #2a2d3a; border-radius: 8px; color: #888; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 600; }

  /* Delete btn */
  .delete-btn { background: #ff444422; color: #ff4444; border: 1px solid #ff444433; border-radius: 7px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: inherit; float: right; }

  /* Hidden */
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- MAIN VIEW -->
<div id="main-view">
  <div class="header">
    <div>
      <div class="logo">GEARTRACK</div>
      <div class="subtitle">Factory Production Tracker</div>
    </div>
    <div class="saved-badge" id="saved-badge">✓ Saved</div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="switchView('dashboard')">📊 Dashboard</button>
    <button class="nav-btn" onclick="switchView('items')">🗂 Items</button>
    <button class="nav-btn" onclick="switchView('log')">📋 Log</button>
    <button class="nav-btn" onclick="switchView('new')">＋ New Item</button>
  </div>
  <div class="body">
    <div id="view-dashboard"></div>
    <div id="view-items" class="hidden"></div>
    <div id="view-log" class="hidden"></div>
    <div id="view-new" class="hidden"></div>
  </div>
</div>

<!-- DETAIL VIEW -->
<div id="detail-view" class="hidden">
  <div class="header">
    <button class="back-btn" onclick="closeDetail()">← Back</button>
    <div>
      <div class="logo">ITEM DETAIL</div>
      <div class="item-title" id="detail-title"></div>
    </div>
    <div class="saved-badge" id="saved-badge-detail">✓ Saved</div>
  </div>
  <div class="body" id="detail-body"></div>
</div>

<!-- MOVE MODAL -->
<div class="overlay hidden" id="move-modal">
  <div class="modal">
    <div class="modal-title">Move to Next Stage</div>
    <div class="modal-flow" id="modal-flow"></div>
    <div class="modal-current" id="modal-current"></div>
    <div class="toggle-row">
      <button class="toggle-btn" id="toggle-advance" onclick="setMoveType('advance')" style="background:#f59e0b22;color:#f59e0b;border-color:#f59e0b44;">Advance Stage</button>
    </div>
    <label>Quantity *</label>
    <input type="number" id="modal-qty" min="0" placeholder="0">
    <label>Rejected / Scrapped</label>
    <input type="number" id="modal-reject" min="0" placeholder="0">
    <label>Date & Time</label>
    <input type="datetime-local" id="modal-date">
    <label>Note (optional)</label>
    <input type="text" id="modal-note" placeholder="e.g. Operator: John, Machine: CNC-2">
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      <button class="confirm-btn" id="modal-confirm-btn" onclick="doMove()" style="background:#f59e0b;">Confirm</button>
    </div>
  </div>
</div>

<script>
const STAGES = [
  { id: "raw",      label: "Raw Material",  unit: "Kg",  icon: "⬛", color: "#94a3b8" },
  { id: "saw",      label: "Saw Cutting",    unit: "Pcs", icon: "🔪", color: "#f59e0b" },
  { id: "forging",  label: "Forging",        unit: "Pcs", icon: "🔨", color: "#ef4444" },
  { id: "cnc",      label: "CNC Turning",    unit: "Pcs", icon: "⚙️",  color: "#8b5cf6" },
  { id: "teeth",    label: "Teeth Cutting",  unit: "Pcs", icon: "🦷", color: "#06b6d4" },
  { id: "heat",     label: "Heat Treatment", unit: "Pcs", icon: "🔥", color: "#f97316" },
  { id: "grinding", label: "Grinding",       unit: "Pcs", icon: "💿", color: "#10b981" },
  { id: "packing",  label: "Packing",        unit: "Pcs", icon: "📦", color: "#3b82f6" },
];
const STAGE_IDS = STAGES.map(s => s.id);
function stageInfo(id) { return STAGES.find(s => s.id === id); }

function fmt(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleString("en-US", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
}
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

// --- State ---
let items = JSON.parse(localStorage.getItem("gf-items") || "[]");
let log   = JSON.parse(localStorage.getItem("gf-log")   || "[]");
let currentView = "dashboard";
let selectedItemId = null;
let moveItemId = null;

function persist() {
  localStorage.setItem("gf-items", JSON.stringify(items));
  localStorage.setItem("gf-log",   JSON.stringify(log));
  // Flash saved badge
  ["saved-badge","saved-badge-detail"].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.add("show"); setTimeout(() => el.classList.remove("show"), 1500); }
  });
}

// --- Navigation ---
function switchView(v) {
  currentView = v;
  ["dashboard","items","log","new"].forEach(n => {
    document.getElementById("view-"+n).classList.toggle("hidden", n !== v);
  });
  document.querySelectorAll(".nav-btn").forEach((btn, i) => {
    btn.classList.toggle("active", ["dashboard","items","log","new"][i] === v);
  });
  render();
}

function openDetail(id) {
  selectedItemId = id;
  document.getElementById("main-view").classList.add("hidden");
  document.getElementById("detail-view").classList.remove("hidden");
  renderDetail();
}

function closeDetail() {
  selectedItemId = null;
  document.getElementById("detail-view").classList.add("hidden");
  document.getElementById("main-view").classList.remove("hidden");
  render();
}

// --- Rendering ---
function render() {
  if (currentView === "dashboard") renderDashboard();
  else if (currentView === "items") renderItems();
  else if (currentView === "log") renderLog();
  else if (currentView === "new") renderNewForm();
}

function renderDashboard() {
  const stageCount = {};
  STAGE_IDS.forEach(s => { stageCount[s] = items.filter(i => i.currentStage === s).length; });
  const total = items.length;
  const packed = stageCount["packing"] || 0;
  const inProg = items.filter(i => i.currentStage !== "packing").length;

  let stageRows = STAGES.map(stage => {
    const count = stageCount[stage.id] || 0;
    if (count === 0) return "";
    return `<div class="dash-stage-row" onclick="switchView('items')">
      <div class="dash-icon" style="background:${stage.color}22;border:1px solid ${stage.color}44;">${stage.icon}</div>
      <div class="dash-stage-name">${stage.label}</div>
      <div class="dash-count" style="color:${stage.color}">${count}</div>
    </div>`;
  }).join("");

  document.getElementById("view-dashboard").innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">TOTAL ITEMS</div></div>
      <div class="stat-card"><div class="stat-num green">${packed}</div><div class="stat-label">PACKED</div></div>
      <div class="stat-card"><div class="stat-num amber">${inProg}</div><div class="stat-label">IN PROGRESS</div></div>
    </div>
    <div class="section-title">ITEMS BY STAGE</div>
    ${stageRows || '<div class="empty">No items yet. Create your first item →</div>'}
  `;
}

function renderItems() {
  if (items.length === 0) {
    document.getElementById("view-items").innerHTML = '<div class="empty">No items yet.<br>Create your first item →</div>';
    return;
  }
  const cards = items.map(item => {
    const curIdx = STAGE_IDS.indexOf(item.currentStage);
    const stage = stageInfo(item.currentStage);
    const progress = Math.round((curIdx / (STAGES.length - 1)) * 100);
    return `<div class="item-card" onclick="openDetail('${item.id}')">
      <div class="item-card-top">
        <div>
          <div class="item-name">${item.name}</div>
          ${item.material ? `<div class="item-mat">${item.material}</div>` : ""}
        </div>
        <div class="stage-pill" style="background:${stage.color}22;color:${stage.color};border:1px solid ${stage.color}44;">${stage.icon} ${stage.label}</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%;background:${stage.color}"></div></div>
      <div class="item-meta"><span>${progress}% complete</span><span>Started: ${fmt(item.createdAt)}</span></div>
    </div>`;
  }).join("");
  document.getElementById("view-items").innerHTML = `<div class="list">${cards}</div>`;
}

function renderLog() {
  if (log.length === 0) {
    document.getElementById("view-log").innerHTML = '<div class="empty">No activity yet.</div>';
    return;
  }
  const entries = log.map(entry => {
    const toStage = stageInfo(entry.to);
    const fromLabel = entry.from ? stageInfo(entry.from)?.label + " → " : "";
    const rejectStr = entry.rejects > 0 ? `<span style="color:#ef4444"> · -${entry.rejects} rejected</span>` : "";
    const noteStr = entry.note ? ` · ${entry.note}` : "";
    return `<div class="log-entry">
      <div class="log-badge" style="background:${toStage.color}22;color:${toStage.color}">${toStage.icon}</div>
      <div>
        <div class="log-name">${entry.itemName}</div>
        <div class="log-meta">${fromLabel}<span style="color:${toStage.color}">${toStage.label}</span> · ${entry.qty} ${toStage.unit}${rejectStr}${noteStr}</div>
        <div class="log-date">${fmt(entry.date)}</div>
      </div>
    </div>`;
  }).join("");
  document.getElementById("view-log").innerHTML = `<div class="list">${entries}</div>`;
}

function renderNewForm() {
  document.getElementById("view-new").innerHTML = `
    <div class="form-card">
      <div class="form-title">NEW PRODUCTION ITEM</div>
      <label>Item Name / Order No. *</label>
      <input type="text" id="new-name" placeholder="e.g. Spur Gear 40T, Helical Gear...">
      <label>Material Type</label>
      <input type="text" id="new-material" placeholder="e.g. EN8 Steel, EN36 Steel...">
      <label>Raw Material Weight (Kg) *</label>
      <input type="number" id="new-weight" min="0" placeholder="e.g. 500">
      <label>Notes</label>
      <input type="text" id="new-notes" placeholder="Optional notes...">
      <button class="submit-btn" onclick="createItem()">Create Item</button>
    </div>`;
}

function renderDetail() {
  const item = items.find(i => i.id === selectedItemId);
  if (!item) { closeDetail(); return; }
  document.getElementById("detail-title").textContent = item.name;

  const curIdx = STAGE_IDS.indexOf(item.currentStage);

  const stageRows = STAGES.map((stage, idx) => {
    const done = idx < curIdx;
    const current = idx === curIdx;
    const pending = idx > curIdx;
    const data = item.stages[stage.id];

    const iconStyle = `background:${(done||current) ? stage.color+"33" : "#1e2130"};border:1px solid ${(done||current) ? stage.color : "#2a2d3a"};`;
    const nameColor = current ? stage.color : (done ? "#e8e8e8" : "#888");
    const prefix = current ? `<span style="color:${stage.color}">▶ </span>` : (done ? '<span style="color:#00e5a0">✓ </span>' : "");
    const connectorClass = done ? "connector-line done" : "connector-line";
    const opacity = pending ? "opacity:0.4;" : "";

    let dataHtml = "";
    if (data) {
      const rejectBadge = data.rejects > 0 ? `<span class="reject-badge">−${data.rejects} rejected</span>` : "";
      dataHtml = `<span class="stage-qty">${data.qty} ${stage.unit}</span>${rejectBadge}
        <span class="stage-date-label">${fmt(data.date)}</span>
        ${data.note ? `<span class="stage-note-label">${data.note}</span>` : ""}`;
    } else {
      dataHtml = `<div class="stage-pending">Not started</div>`;
    }

    return `<div class="stage-row">
      <div class="stage-icon-box" style="${iconStyle}">${stage.icon}</div>
      <div class="stage-connector-col">
        ${idx < STAGES.length-1 ? `<div class="${connectorClass}"></div>` : ""}
      </div>
      <div class="stage-info-col" style="${opacity}">
        <div class="stage-name-label ${done?'completed':''}" style="color:${nameColor}">${prefix}${stage.label}</div>
        ${dataHtml}
      </div>
    </div>`;
  }).join("");

  const actionBtn = curIdx < STAGES.length - 1
    ? `<button class="move-btn" onclick="openModal('${item.id}')">Move to ${stageInfo(STAGE_IDS[curIdx+1])?.label} →</button>`
    : `<div class="complete-badge">✓ Production Complete — Packed</div>`;

  const deleteBtn = `<button class="delete-btn" onclick="deleteItem('${item.id}')">✕ Delete Item</button>`;

  document.getElementById("detail-body").innerHTML = `
    <div class="info-row">
      ${item.material ? `<span class="tag">Material: ${item.material}</span>` : ""}
      <span class="tag">Created: ${fmt(item.createdAt)}</span>
      ${deleteBtn}
    </div>
    <div class="pipeline-card">
      <div class="section-title">PRODUCTION FLOW</div>
      ${stageRows}
    </div>
    ${actionBtn}
  `;
}

// --- Actions ---
function createItem() {
  const name = document.getElementById("new-name").value.trim();
  const material = document.getElementById("new-material").value.trim();
  const weight = document.getElementById("new-weight").value;
  const notes = document.getElementById("new-notes").value.trim();
  if (!name || !weight) { alert("Please fill in Item Name and Weight."); return; }

  const item = {
    id: genId(), name, material, notes,
    createdAt: new Date().toISOString(),
    currentStage: "raw",
    stages: { raw: { qty: Number(weight), date: new Date().toISOString(), rejects: 0, note: notes } }
  };
  items.unshift(item);
  log.unshift({ id: genId(), itemId: item.id, itemName: item.name, from: null, to: "raw", qty: item.stages.raw.qty, rejects: 0, date: item.stages.raw.date, note: "Item created" });
  persist();
  switchView("items");
}

function deleteItem(id) {
  if (!confirm("Delete this item and all its history?")) return;
  items = items.filter(i => i.id !== id);
  log = log.filter(l => l.itemId !== id);
  persist();
  closeDetail();
}

function openModal(id) {
  moveItemId = id;
  const item = items.find(i => i.id === id);
  const curIdx = STAGE_IDS.indexOf(item.currentStage);
  const curStage = stageInfo(item.currentStage);
  const nextStage = stageInfo(STAGE_IDS[curIdx + 1]);
  const curData = item.stages[item.currentStage];

  document.getElementById("modal-flow").innerHTML =
    `<span style="color:${curStage.color}">${curStage.icon} ${curStage.label}</span> → <span style="color:${nextStage.color}">${nextStage.icon} ${nextStage.label}</span>`;
  document.getElementById("modal-current").textContent = curData ? `Input: ${curData.qty} ${curStage.unit}` : "";
  document.getElementById("modal-qty").value = "";
  document.getElementById("modal-reject").value = "";
  document.getElementById("modal-note").value = "";
  document.getElementById("modal-date").value = new Date().toISOString().slice(0,16);
  document.getElementById("modal-confirm-btn").style.background = nextStage.color;
  document.getElementById("move-modal").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("move-modal").classList.add("hidden");
  moveItemId = null;
}

function doMove() {
  const qty = Number(document.getElementById("modal-qty").value);
  if (!qty || qty <= 0) { alert("Please enter a valid quantity."); return; }
  const rejects = Number(document.getElementById("modal-reject").value) || 0;
  const note = document.getElementById("modal-note").value.trim();
  const dateVal = document.getElementById("modal-date").value;
  const dateISO = dateVal ? new Date(dateVal).toISOString() : new Date().toISOString();

  const itemIdx = items.findIndex(i => i.id === moveItemId);
  const item = items[itemIdx];
  const curIdx = STAGE_IDS.indexOf(item.currentStage);
  const nextStageId = STAGE_IDS[curIdx + 1];

  const updated = {
    ...item,
    currentStage: nextStageId,
    stages: { ...item.stages, [nextStageId]: { qty, date: dateISO, rejects, note } }
  };
  items[itemIdx] = updated;
  log.unshift({ id: genId(), itemId: item.id, itemName: item.name, from: item.currentStage, to: nextStageId, qty, rejects, date: dateISO, note });
  persist();
  closeModal();
  if (selectedItemId === moveItemId) renderDetail();
}
