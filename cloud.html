<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GearTrack Cloud</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase CDN (SAFE compat version) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }
header { background:#000; padding:15px; font-size:20px; }
.container { padding:15px; }
input, select, textarea {
  width:100%; padding:8px; margin:6px 0;
  background:#222; color:white; border:1px solid #444;
}
button {
  padding:10px; margin:5px 0;
  background:#0a84ff; color:white; border:none;
}
.card {
  background:#1c1c1c; padding:12px; margin:10px 0;
  border:1px solid #333;
}
.stage { font-size:13px; color:#0a84ff; }
.small { font-size:12px; color:#aaa; }
</style>
</head>

<body>

<header>GearTrack Cloud</header>

<div class="container">

<div id="loginBox">
<h3>Company Login</h3>
<input id="email" placeholder="Company Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

<h3>Create Item</h3>
<input id="name" placeholder="Item Name">
<input id="material" placeholder="Material">
<input id="qty" placeholder="Quantity">
<textarea id="notes" placeholder="Notes"></textarea>
<button onclick="createItem()">Create Item</button>

<h3>Items</h3>
<div id="items"></div>

</div>

</div>

<script>

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCqFhnvlvjs3XQM5PNecQsFt49A4qUvTsE",
  authDomain: "geartrack1995.firebaseapp.com",
  projectId: "geartrack1995",
  storageBucket: "geartrack1995.firebasestorage.app",
  messagingSenderId: "726049606513",
  appId: "1:726049606513:web:b92218ef2c390f638a84d0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

const stages = ["Raw","Cutting","Heat Treatment","Grinding","Finished"];

function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  auth.signInWithEmailAndPassword(email,password)
    .catch(e=>alert(e.message));
}

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";
    listenItems();
  }
});

function createItem(){
  const name = document.getElementById("name").value;
  const material = document.getElementById("material").value;
  const qty = Number(document.getElementById("qty").value);
  const notes = document.getElementById("notes").value;

  if(!name || !qty) return alert("Fill required fields");

  db.collection("items").add({
    name,
    material,
    currentStage:"Raw",
    history:{
      Raw:{
        qty,
        rejects:0,
        note:notes,
        date:new Date().toISOString()
      }
    },
    createdAt:new Date()
  });
}

function moveItem(id,nextStage){
  const qty = prompt("Enter Quantity:");
  const rejects = prompt("Rejects:");
  const note = prompt("Note:");

  db.collection("items").doc(id).update({
    currentStage: nextStage,
    ["history."+nextStage]:{
      qty:Number(qty),
      rejects:Number(rejects||0),
      note:note||"",
      date:new Date().toISOString()
    }
  });
}

function deleteItem(id){
  if(confirm("Delete item?")){
    db.collection("items").doc(id).delete();
  }
}

function listenItems(){
  db.collection("items").orderBy("createdAt","desc")
    .onSnapshot(snapshot=>{
      const container = document.getElementById("items");
      container.innerHTML="";
      snapshot.forEach(doc=>{
        const data = doc.data();
        container.innerHTML += `
          <div class="card">
            <b>${data.name}</b><br>
            ${data.material||""}<br>
            <div class="stage">Stage: ${data.currentStage}</div>
            <div class="small">Created: ${new Date(data.createdAt.seconds*1000).toLocaleString()}</div>
            <button onclick="moveItem('${doc.id}','Cutting')">→ Cutting</button>
            <button onclick="moveItem('${doc.id}','Heat Treatment')">→ Heat</button>
            <button onclick="moveItem('${doc.id}','Grinding')">→ Grinding</button>
            <button onclick="moveItem('${doc.id}','Finished')">→ Finished</button>
            <button onclick="deleteItem('${doc.id}')">Delete</button>
          </div>
        `;
      });
    });
}

</script>

</body>
</html>
