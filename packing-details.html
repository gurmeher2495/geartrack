<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0c12">
<title>PackTrack</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, doc, onSnapshot, setDoc, deleteDoc, addDoc, serverTimestamp, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCqFhnvlvjs3XQM5PNecQsFt49A4qUvTsE",
    authDomain:        "geartrack1995.firebaseapp.com",
    projectId:         "geartrack1995",
    storageBucket:     "geartrack1995.firebasestorage.app",
    messagingSenderId: "726049606513",
    appId:             "1:726049606513:web:b92218ef2c390f638e84d0",
    measurementId:     "G-SZ4NCDFGSB"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  window._fb = { auth, db, signInWithEmailAndPassword, signOut, onAuthStateChanged,
                 collection, doc, onSnapshot, setDoc, deleteDoc, addDoc, serverTimestamp, query, orderBy };
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow:wght@700;900&display=swap');

  :root {
    --bg: #0a0c12;
    --surface: #11131f;
    --border: #1e2235;
    --border2: #2a2d3a;
    --text: #e8e8e8;
    --muted: #666;
    --accent: #00c2ff;
    --accent2: #00e5a0;
    --warn: #f59e0b;
    --danger: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Mono', 'Courier New', monospace; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 50px; }

  /* Login */
  #login-screen { display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:100vh; padding:30px 24px; }
  .login-logo { font-family:'Barlow',sans-serif; font-size:36px; font-weight:900; letter-spacing:6px; color:var(--accent); margin-bottom:6px; }
  .login-sub  { font-size:10px; color:#555; letter-spacing:3px; margin-bottom:48px; }
  .login-card { width:100%; background:var(--surface); border:1px solid var(--border); border-top:2px solid var(--accent); border-radius:14px; padding:28px 24px; }
  .login-card h2 { font-size:13px; font-weight:500; color:#888; letter-spacing:2px; margin-bottom:20px; }
  .login-error { background:#ef444422; border:1px solid #ef444433; border-radius:7px; color:var(--danger); font-size:12px; padding:10px 12px; margin-bottom:14px; display:none; }
  .login-error.show { display:block; }

  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 18px 13px; display: flex; justify-content: space-between; align-items: center; }
  .logo { font-family: 'Barlow', sans-serif; font-size: 22px; font-weight: 900; letter-spacing: 4px; color: var(--accent); }
  .subtitle { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-top: 2px; }
  .header-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
  .signout-btn { background:none; border:1px solid var(--border2); border-radius:7px; color:#666; font-size:10px; padding:5px 9px; cursor:pointer; font-family:inherit; letter-spacing:1px; }
  .saved-badge { background: #00e5a022; color: var(--accent2); border: 1px solid #00e5a044; border-radius: 6px; padding: 4px 10px; font-size: 11px; opacity: 0; transition: opacity 0.3s; }
  .saved-badge.show { opacity: 1; }
  .sync-bar { text-align:center; font-size:10px; color:var(--accent); letter-spacing:2px; padding:6px; background:#00c2ff11; display:none; }
  .sync-bar.show { display:block; }

  /* Nav */
  .nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
  .nav-btn { flex: 1; padding: 12px 4px; background: none; border: none; color: var(--muted); font-size: 10px; cursor: pointer; letter-spacing: 0.5px; border-bottom: 2px solid transparent; font-family: inherit; text-align: center; }
  .nav-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

  /* Body */
  .body { padding: 14px; }

  /* Stats */
  .stats-row { display: flex; gap: 10px; margin-bottom: 18px; }
  .stat-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 13px 8px; text-align: center; }
  .stat-num { font-size: 24px; font-weight: 700; }
  .stat-label { font-size: 9px; color: var(--muted); margin-top: 3px; letter-spacing: 1px; }

  /* Section title */
  .section-title { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-bottom: 10px; }

  /* Cards */
  .list { display: flex; flex-direction: column; gap: 10px; }
  .item-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; }
  .item-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .item-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .item-sub { font-size: 11px; color: var(--muted); }
  .qty-badge { background: var(--accent)22; color: var(--accent); border: 1px solid var(--accent)44; border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 700; white-space: nowrap; }
  .item-details-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .detail-chip { background: #1e2235; border: 1px solid var(--border2); border-radius: 6px; padding: 3px 9px; font-size: 10px; color: #999; }

  /* Box size card */
  .box-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; }
  .box-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .box-card-name { font-size: 13px; font-weight: 700; }
  .box-card-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .box-dims { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 10px; }
  .dim-input-wrap { flex: 1; }
  .dim-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; margin-bottom: 4px; }
  .dim-sep { color: var(--muted); font-size: 16px; font-weight: 700; padding-bottom: 10px; }
  .vol-result { background: var(--accent)11; border: 1px solid var(--accent)33; border-radius: 8px; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; }
  .vol-label { font-size: 10px; color: var(--muted); }
  .vol-value { font-size: 13px; font-weight: 700; color: var(--accent); }
  .vol-total { font-size: 13px; font-weight: 700; color: var(--accent2); }

  /* Summary table */
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 14px; }
  .summary-row { display: flex; padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .summary-row:last-child { border-bottom: none; }
  .summary-row.header-row { background: #1e223588; font-size: 10px; color: var(--muted); letter-spacing: 1px; }
  .summary-col-name { flex: 2; }
  .summary-col { flex: 1; text-align: right; }
  .summary-col.accent { color: var(--accent); font-weight: 700; }
  .summary-col.green { color: var(--accent2); font-weight: 700; }

  /* Form */
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 14px; }
  .form-title { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 18px; letter-spacing: 2px; }
  label { display: block; font-size: 10px; color: #777; letter-spacing: 1px; margin-bottom: 5px; margin-top: 13px; }
  input, select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 13px; outline: none; font-family: inherit; }
  input:focus { border-color: var(--accent)66; }
  .calc-result { background: var(--accent)11; border: 1px solid var(--accent)33; border-radius: 8px; padding: 10px 12px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
  .calc-result-label { font-size: 10px; color: var(--muted); }
  .calc-result-val { font-size: 18px; font-weight: 700; color: var(--accent); }
  .submit-btn { margin-top: 18px; width: 100%; padding: 13px 0; background: var(--accent); color: var(--bg); border: none; border-radius: 9px; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 1px; font-family: inherit; }
  .save-box-btn { width: 100%; padding: 11px 0; background: var(--accent2)22; color: var(--accent2); border: 1px solid var(--accent2)44; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 10px; }
  .delete-btn { background: #ff444422; color: #ff4444; border: 1px solid #ff444433; border-radius: 6px; padding: 3px 9px; font-size: 10px; cursor: pointer; font-family: inherit; }

  /* Spinner */
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid #0a0c1255; border-top-color:#0a0c12; border-radius:50%; animation:spin 0.6s linear infinite; vertical-align:middle; margin-right:6px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Empty */
  .empty { text-align: center; color: #444; padding: 50px 20px; line-height: 2; font-size: 13px; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">PACKTRACK</div>
  <div class="login-sub">Packing Details Organizer</div>
  <div class="login-card">
    <h2>SIGN IN TO CONTINUE</h2>
    <div class="login-error" id="login-error"></div>
    <label>Email</label>
    <input type="email" id="login-email" placeholder="factory@example.com" autocomplete="username">
    <label>Password</label>
    <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    <button class="submit-btn" id="login-btn" onclick="doLogin()">Sign In</button>
    <div style="font-size:10px;color:#444;margin-top:14px;text-align:center;line-height:1.7;">
      Use the same credentials as GearTrack.
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="header">
    <div>
      <div class="logo">PACKTRACK</div>
      <div class="subtitle">Packing Details Organizer</div>
    </div>
    <div class="header-right">
      <button class="signout-btn" onclick="doSignOut()">Sign Out</button>
      <div class="saved-badge" id="saved-badge">✓ Synced</div>
    </div>
  </div>
  <div class="sync-bar" id="sync-bar">⟳ SYNCING...</div>
  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('summary')">📊 Summary</button>
    <button class="nav-btn" onclick="switchTab('items')">📦 Items</button>
    <button class="nav-btn" onclick="switchTab('boxes')">📐 Box Sizes</button>
    <button class="nav-btn" onclick="switchTab('add')">＋ Add Item</button>
  </div>
  <div class="body">
    <div id="tab-summary"></div>
    <div id="tab-items" class="hidden"></div>
    <div id="tab-boxes" class="hidden"></div>
    <div id="tab-add" class="hidden"></div>
  </div>
</div>

<script>
// ---- Firebase refs ----
let _auth, _db, _col, _doc, _setDoc, _deleteDoc, _addDoc, _query, _orderBy, _onSnapshot, _serverTimestamp;

// ---- State ----
let packItems = [];
let boxSizes  = {};  // itemId -> {l,b,h}
let currentTab = 'summary';
let unsubItems = null;
let unsubBoxes = null;

// ---- Auth ----
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  const btn   = document.getElementById('login-btn');
  errEl.classList.remove('show');
  btn.innerHTML = '<span class="spinner"></span>Signing in...';
  btn.disabled = true;
  try {
    await _auth.signIn(email, pass);
  } catch(e) {
    errEl.textContent = friendlyError(e.code);
    errEl.classList.add('show');
    btn.innerHTML = 'Sign In';
    btn.disabled = false;
  }
}

function friendlyError(code) {
  if (['auth/wrong-password','auth/user-not-found','auth/invalid-credential'].includes(code))
    return 'Incorrect email or password.';
  if (code === 'auth/too-many-requests') return 'Too many attempts. Please wait.';
  return 'Login failed. Please try again.';
}

async function doSignOut() {
  if (unsubItems) unsubItems();
  if (unsubBoxes) unsubBoxes();
  packItems = []; boxSizes = {};
  await _auth.signOut();
}

function onUserLoggedIn() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('login-btn').innerHTML = 'Sign In';
  document.getElementById('login-btn').disabled = false;
  startListeners();
}

function onUserLoggedOut() {
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}

// ---- Firestore listeners ----
function startListeners() {
  showSync(true);

  const itemsQ = _query(_col(_db, 'pack-items'), _orderBy('createdAt', 'desc'));
  unsubItems = _onSnapshot(itemsQ, snap => {
    packItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
    showSync(false);
    flashSaved();
  });

  const boxesQ = _col(_db, 'pack-boxes');
  unsubBoxes = _onSnapshot(boxesQ, snap => {
    boxSizes = {};
    snap.docs.forEach(d => { boxSizes[d.id] = d.data(); });
    render();
  });
}

function showSync(on) { document.getElementById('sync-bar').classList.toggle('show', on); }
function flashSaved() {
  const el = document.getElementById('saved-badge');
  if (el) { el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 1800); }
}

// ---- Navigation ----
function switchTab(t) {
  currentTab = t;
  ['summary','items','boxes','add'].forEach(n => {
    document.getElementById('tab-'+n).classList.toggle('hidden', n !== t);
  });
  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['summary','items','boxes','add'][i] === t);
  });
  render();
}

function render() {
  if (currentTab === 'summary') renderSummary();
  else if (currentTab === 'items') renderItems();
  else if (currentTab === 'boxes') renderBoxes();
  else if (currentTab === 'add') renderAddForm();
}

// ---- Summary ----
function renderSummary() {
  const totalItems = packItems.length;
  const totalBoxes = packItems.reduce((s, i) => s + (i.numBoxes || 0), 0);
  const totalQty   = packItems.reduce((s, i) => s + (i.totalQty || 0), 0);

  let totalVol = 0;
  packItems.forEach(item => {
    const b = boxSizes[item.id];
    if (b && b.l && b.b && b.h) totalVol += (b.l * b.b * b.h / 1000000) * item.numBoxes;
  });

  const tableRows = packItems.map(item => {
    const b = boxSizes[item.id];
    const vol = b && b.l && b.b && b.h
      ? ((b.l * b.b * b.h / 1000000) * item.numBoxes).toFixed(3) + ' m³' : '—';
    return `<div class="summary-row">
      <div class="summary-col-name">
        <div style="font-size:12px;font-weight:600;">${item.name}</div>
        ${item.orderNo ? `<div style="font-size:10px;color:#666;">${item.orderNo}</div>` : ''}
      </div>
      <div class="summary-col accent">${item.numBoxes}</div>
      <div class="summary-col green">${item.totalQty}</div>
      <div class="summary-col" style="color:#888;">${vol}</div>
    </div>`;
  }).join('');

  document.getElementById('tab-summary').innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${totalItems}</div><div class="stat-label">ITEMS</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--warn)">${totalBoxes}</div><div class="stat-label">TOTAL BOXES</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--accent2)">${totalQty}</div><div class="stat-label">TOTAL QTY</div></div>
    </div>
    ${totalVol > 0 ? `
    <div style="background:#00c2ff11;border:1px solid #00c2ff33;border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:10px;color:#666;letter-spacing:1px;">TOTAL VOLUME</span>
      <span style="font-size:18px;font-weight:700;color:var(--accent)">${totalVol.toFixed(3)} m³</span>
    </div>` : ''}
    <div class="section-title">ALL ITEMS</div>
    ${packItems.length === 0
      ? '<div class="empty">No items yet.<br>Add your first packing item →</div>'
      : `<div class="summary-card">
          <div class="summary-row header-row">
            <div class="summary-col-name">ITEM</div>
            <div class="summary-col">BOXES</div>
            <div class="summary-col">QTY</div>
            <div class="summary-col">VOLUME</div>
          </div>
          ${tableRows}
        </div>`}
  `;
}

// ---- Items List ----
function renderItems() {
  if (packItems.length === 0) {
    document.getElementById('tab-items').innerHTML = '<div class="empty">No items yet.<br>Go to Add Item →</div>';
    return;
  }
  const cards = packItems.map(item => {
    const b = boxSizes[item.id];
    const hasBox = b && b.l && b.b && b.h;
    const totalVol = hasBox ? ((b.l * b.b * b.h / 1000000) * item.numBoxes).toFixed(3) : null;
    return `<div class="item-card">
      <div class="item-card-top">
        <div>
          <div class="item-name">${item.name}</div>
          <div class="item-sub">${item.orderNo ? 'Order: ' + item.orderNo : ''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;">
          <div class="qty-badge">${item.totalQty} pcs</div>
          <button class="delete-btn" onclick="deleteItem('${item.id}')">✕ Delete</button>
        </div>
      </div>
      <div class="item-details-row">
        <div class="detail-chip">📦 ${item.numBoxes} boxes</div>
        <div class="detail-chip">× ${item.qtyPerBox} per box</div>
        ${item.netWeight ? `<div class="detail-chip">Net: ${item.netWeight} kg</div>` : ''}
        ${item.grossWeight ? `<div class="detail-chip">Gross: ${item.grossWeight} kg</div>` : ''}
        ${hasBox
          ? `<div class="detail-chip" style="color:var(--accent);border-color:var(--accent)44;">📐 ${b.l}×${b.b}×${b.h} cm</div>`
          : '<div class="detail-chip" style="color:#555;">No box size yet</div>'}
        ${totalVol ? `<div class="detail-chip" style="color:var(--accent2);border-color:var(--accent2)44;">Vol: ${totalVol} m³</div>` : ''}
      </div>
    </div>`;
  }).join('');
  document.getElementById('tab-items').innerHTML = `<div class="list">${cards}</div>`;
}

// ---- Box Sizes ----
function renderBoxes() {
  if (packItems.length === 0) {
    document.getElementById('tab-boxes').innerHTML = '<div class="empty">No items yet.<br>Add items first →</div>';
    return;
  }
  const cards = packItems.map(item => {
    const b = boxSizes[item.id] || {};
    const hasAll = b.l && b.b && b.h;
    const volPerBox = hasAll ? (b.l * b.b * b.h / 1000000).toFixed(4) : null;
    const totalVol  = hasAll ? ((b.l * b.b * b.h / 1000000) * item.numBoxes).toFixed(3) : null;
    return `<div class="box-card">
      <div class="box-card-header">
        <div>
          <div class="box-card-name">${item.name}</div>
          <div class="box-card-sub">${item.numBoxes} boxes · ${item.totalQty} pcs total</div>
        </div>
        ${hasAll
          ? `<div style="background:var(--accent2)22;color:var(--accent2);border:1px solid var(--accent2)44;border-radius:6px;padding:3px 9px;font-size:10px;">✓ Set</div>`
          : `<div style="color:#555;font-size:10px;">Not set</div>`}
      </div>
      <div class="box-dims">
        <div class="dim-input-wrap">
          <div class="dim-label">LENGTH (cm)</div>
          <input type="number" min="0" placeholder="L" value="${b.l || ''}" id="dim-l-${item.id}" oninput="updateVol('${item.id}')">
        </div>
        <div class="dim-sep">×</div>
        <div class="dim-input-wrap">
          <div class="dim-label">BREADTH (cm)</div>
          <input type="number" min="0" placeholder="B" value="${b.b || ''}" id="dim-b-${item.id}" oninput="updateVol('${item.id}')">
        </div>
        <div class="dim-sep">×</div>
        <div class="dim-input-wrap">
          <div class="dim-label">HEIGHT (cm)</div>
          <input type="number" min="0" placeholder="H" value="${b.h || ''}" id="dim-h-${item.id}" oninput="updateVol('${item.id}')">
        </div>
      </div>
      <div class="vol-result">
        <div>
          <div class="vol-label">VOL PER BOX</div>
          <div class="vol-value" id="vol-per-${item.id}">${volPerBox ? volPerBox + ' m³' : '—'}</div>
        </div>
        <div style="text-align:right;">
          <div class="vol-label">TOTAL VOLUME (${item.numBoxes} boxes)</div>
          <div class="vol-total" id="vol-total-${item.id}">${totalVol ? totalVol + ' m³' : '—'}</div>
        </div>
      </div>
      <button class="save-box-btn" onclick="saveBoxSize('${item.id}')">Save Box Size</button>
    </div>`;
  }).join('');
  document.getElementById('tab-boxes').innerHTML = `<div class="list">${cards}</div>`;
}

function updateVol(itemId) {
  const l = parseFloat(document.getElementById('dim-l-'+itemId)?.value) || 0;
  const b = parseFloat(document.getElementById('dim-b-'+itemId)?.value) || 0;
  const h = parseFloat(document.getElementById('dim-h-'+itemId)?.value) || 0;
  const item = packItems.find(i => i.id === itemId);
  if (!item) return;
  const perBox = l && b && h ? (l * b * h / 1000000).toFixed(4) + ' m³' : '—';
  const total  = l && b && h ? ((l * b * h / 1000000) * item.numBoxes).toFixed(3) + ' m³' : '—';
  const perEl = document.getElementById('vol-per-'+itemId);
  const totEl = document.getElementById('vol-total-'+itemId);
  if (perEl) perEl.textContent = perBox;
  if (totEl) totEl.textContent = total;
}

async function saveBoxSize(itemId) {
  const l = parseFloat(document.getElementById('dim-l-'+itemId)?.value) || 0;
  const b = parseFloat(document.getElementById('dim-b-'+itemId)?.value) || 0;
  const h = parseFloat(document.getElementById('dim-h-'+itemId)?.value) || 0;
  if (!l || !b || !h) { alert('Please enter all three dimensions.'); return; }
  try {
    showSync(true);
    await _setDoc(_doc(_db, 'pack-boxes', itemId), { l, b, h });
  } catch(e) {
    alert('Error saving: ' + e.message);
    showSync(false);
  }
}

// ---- Add Form ----
function renderAddForm() {
  document.getElementById('tab-add').innerHTML = `
    <div class="form-card">
      <div class="form-title">NEW PACKING ITEM</div>
      <label>Item Name *</label>
      <input type="text" id="new-name" placeholder="e.g. Spur Gear 40T">
      <label>Order Number</label>
      <input type="text" id="new-order" placeholder="e.g. ORD-2024-001">
      <label>Quantity Per Box *</label>
      <input type="number" id="new-qpb" min="1" placeholder="e.g. 10" oninput="calcTotal()">
      <label>Number of Boxes *</label>
      <input type="number" id="new-boxes" min="1" placeholder="e.g. 5" oninput="calcTotal()">
      <div class="calc-result">
        <div class="calc-result-label">TOTAL QUANTITY</div>
        <div class="calc-result-val" id="calc-total">—</div>
      </div>
      <label>Net Weight Per Box (kg)</label>
      <input type="number" id="new-net" min="0" placeholder="e.g. 12.5">
      <label>Gross Weight Per Box (kg)</label>
      <input type="number" id="new-gross" min="0" placeholder="e.g. 14.0">
      <button class="submit-btn" onclick="addItem()">Add Item</button>
    </div>`;
}

function calcTotal() {
  const qpb   = parseFloat(document.getElementById('new-qpb')?.value) || 0;
  const boxes = parseFloat(document.getElementById('new-boxes')?.value) || 0;
  const el = document.getElementById('calc-total');
  if (el) el.textContent = qpb && boxes ? (qpb * boxes) + ' pcs' : '—';
}

async function addItem() {
  const name        = document.getElementById('new-name').value.trim();
  const orderNo     = document.getElementById('new-order').value.trim();
  const qtyPerBox   = parseFloat(document.getElementById('new-qpb').value) || 0;
  const numBoxes    = parseFloat(document.getElementById('new-boxes').value) || 0;
  const netWeight   = parseFloat(document.getElementById('new-net').value) || null;
  const grossWeight = parseFloat(document.getElementById('new-gross').value) || null;
  if (!name || !qtyPerBox || !numBoxes) { alert('Please fill in Item Name, Qty Per Box, and Number of Boxes.'); return; }
  try {
    showSync(true);
    await _addDoc(_col(_db, 'pack-items'), {
      name, orderNo, qtyPerBox, numBoxes,
      totalQty: qtyPerBox * numBoxes,
      netWeight, grossWeight,
      createdAt: _serverTimestamp()
    });
    switchTab('items');
  } catch(e) {
    alert('Error saving: ' + e.message);
    showSync(false);
  }
}

async function deleteItem(id) {
  if (!confirm('Delete this item?')) return;
  try {
    showSync(true);
    await _deleteDoc(_doc(_db, 'pack-items', id));
    await _deleteDoc(_doc(_db, 'pack-boxes', id));
  } catch(e) {
    alert('Error deleting: ' + e.message);
    showSync(false);
  }
}

// ---- Bootstrap ----
function waitForFirebase() {
  const fb = window._fb;
  if (!fb) { setTimeout(waitForFirebase, 100); return; }

  _db             = fb.db;
  _col            = fb.collection;
  _doc            = fb.doc;
  _setDoc         = fb.setDoc;
  _deleteDoc      = fb.deleteDoc;
  _addDoc         = fb.addDoc;
  _query          = fb.query;
  _orderBy        = fb.orderBy;
  _onSnapshot     = fb.onSnapshot;
  _serverTimestamp= fb.serverTimestamp;

  _auth = {
    signIn:   (email, pass) => fb.signInWithEmailAndPassword(fb.auth, email, pass),
    signOut:  () => fb.signOut(fb.auth)
  };

  // Always sign out first so login screen always shows
  fb.signOut(fb.auth).then(() => {
    fb.onAuthStateChanged(fb.auth, user => {
      if (user) onUserLoggedIn();
      else onUserLoggedOut();
    });
  });
}

waitForFirebase();

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('login-screen').classList.contains('hidden')) {
    doLogin();
  }
});
</script>
